services:
  db:
    image: postgres:16-alpine
    container_name: voiler-db-prod
    restart: unless-stopped
    # ports:
    #   - '5432:5432'
    environment:
      POSTGRES_USER: '${POSTGRES_USER:?required}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:?required}'
      POSTGRES_DB: '${POSTGRES_DB:-voiler}'
    volumes:
      - voiler_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-voiler}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: voiler-api-prod
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: '${DATABASE_URL:?required}'
      AUTH_SECRET: '${AUTH_SECRET:?required}'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: '${VITE_API_URL:?required}'
    container_name: voiler-web-prod
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  voiler_pgdata_prod:
    driver: local
